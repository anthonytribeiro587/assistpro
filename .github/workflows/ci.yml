name: AssistPro CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Type check
        id: typecheck
        shell: bash
        run: |
          set +e
          npx tsc --noEmit 2>&1 | tee typecheck.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload typecheck log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-log
          path: typecheck.log
          if-no-files-found: error
          retention-days: 3

      - name: Fail on type errors
        if: steps.typecheck.outputs.status != '0'
        run: exit 1

      - name: Production build
        run: npm run build
